<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Block Builder Lego Edition</title>
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- UI Layout --- */

        /* Sidebar Izquierdo (Piezas) */
        #sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            bottom: 20px;
            width: 220px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .grid-pieces {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .piece-btn {
            background: #fff;
            border: 2px solid #eee;
            border-radius: 12px;
            height: 80px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }

        .piece-btn:hover {
            border-color: #ccc;
            transform: translateY(-2px);
        }

        .piece-btn.active {
            border-color: #48dbfb;
            background-color: #f0fbff;
            box-shadow: 0 0 0 2px rgba(72, 219, 251, 0.3);
        }

        .piece-preview {
            width: 40px;
            height: 40px;
            background: #ddd;
            border-radius: 4px;
            position: relative;
            box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.1);
        }

        /* Representación visual simple de los botones */
        .p-1x1 .piece-preview {
            width: 20px;
            height: 20px;
        }

        .p-2x1 .piece-preview {
            width: 40px;
            height: 20px;
        }

        .p-2x2 .piece-preview {
            width: 40px;
            height: 40px;
        }

        .p-2x3 .piece-preview {
            width: 40px;
            height: 50px;
        }

        .p-2x4 .piece-preview {
            width: 40px;
            height: 60px;
        }

        .p-1x4 .piece-preview {
            width: 20px;
            height: 60px;
        }

        .piece-label {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            font-weight: 600;
        }

        /* Panel Inferior (Colores y Herramientas) */
        #bottom-bar {
            position: absolute;
            bottom: 20px;
            left: 260px;
            /* Dejar espacio para sidebar */
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .color-palette {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            padding-right: 10px;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 3px solid transparent;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s, border-color 0.1s;
            flex-shrink: 0;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: #333;
            transform: scale(1.1);
        }

        .tools-area {
            display: flex;
            gap: 10px;
            padding-left: 20px;
            border-left: 2px solid #eee;
        }

        .tool-btn {
            background: #f1f2f6;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #555;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: #e1e2e6;
            color: #000;
        }

        .tool-btn.active {
            background: #ff4757;
            color: white;
        }

        .tool-btn.action-blue {
            background: #48dbfb;
            color: white;
        }

        .tool-btn.action-blue:hover {
            background: #0abde3;
        }

        .tool-btn.action-orange {
            background: #ffa502;
            color: white;
        }

        /* Notification */
        #toast {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3436;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* Controls Help */
        #controls-help {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            text-align: right;
        }

        .shortcut {
            background: rgba(255, 255, 255, 0.2);
            padding: 1px 5px;
            border-radius: 3px;
            font-family: monospace;
            margin-left: 5px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>

    <div id="toast">Mundo reiniciado</div>

    <div id="controls-help">
        <div>Rotar Cámara: <strong>Click Izquierdo</strong></div>
        <div>Zoom: <strong>Rueda</strong></div>
        <div>Pan: <strong>Click Derecho</strong></div>
        <div>Rotar Pieza: <span class="shortcut">R</span></div>
        <div>Borrar: <span class="shortcut">Click</span> en modo 🗑️</div>
    </div>

    <!-- Sidebar de Piezas -->
    <div id="sidebar">
        <div class="sidebar-title">Biblioteca</div>
        <div class="grid-pieces" id="pieces-container">
            <!-- Generado por JS -->
        </div>

        <div class="sidebar-title" style="margin-top: 20px;">Propiedades</div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="font-size: 14px; color: #555;">Rotación</span>
            <button class="tool-btn action-blue" id="rotate-btn" title="Rotar (R)" style="width: 100%;">
                <i class="fas fa-sync-alt"></i> &nbsp; Girar 90°
            </button>
        </div>
    </div>

    <!-- Barra Inferior -->
    <div id="bottom-bar">
        <div class="color-palette" id="color-palette">
            <!-- Generado por JS -->
        </div>

        <div class="tools-area">
            <button class="tool-btn" id="delete-btn" title="Modo Borrar">
                <i class="fas fa-trash-alt"></i>
            </button>
            <button class="tool-btn action-orange" id="clear-btn" title="Reiniciar Mundo">
                <i class="fas fa-undo"></i>
            </button>
        </div>
    </div>

    <script>
        // --- Configuración Inicial ---
        let scene, camera, renderer;
        let plane;
        let raycaster, pointer;
        let controls; // OrbitControls
        let isDragging = false;
        let dragStartPos = { x: 0, y: 0 }; // Para distinguir click de drag

        // Configuración de Lego
        const UNIT = 50; // Tamaño de 1x1 stud
        const objects = []; // Objetos interactuables

        // Estado de la Aplicación
        let state = {
            color: 0xff0000, // Rojo por defecto
            isDeleteMode: false,
            rotation: 0, // 0 o 1 (0 = normal, 1 = rotado 90)
            blockType: { w: 2, d: 2, name: '2x2' } // Bloque seleccionado
        };

        let rollOverMesh; // El cursor
        let ghostGroup;   // Grupo del cursor

        // Definición de Piezas
        const pieceTypes = [
            { w: 1, d: 1, name: '1x1', class: 'p-1x1' },
            { w: 2, d: 1, name: '2x1', class: 'p-2x1' },
            { w: 2, d: 2, name: '2x2', class: 'p-2x2' },
            { w: 3, d: 2, name: '2x3', class: 'p-2x3' },
            { w: 4, d: 2, name: '2x4', class: 'p-2x4' },
            { w: 4, d: 1, name: '1x4', class: 'p-1x4' }
        ];

        // Colores Lego
        const legoColors = [
            0xD50000, // Rojo Brillante
            0xFF8F00, // Naranja
            0xFFD600, // Amarillo
            0x00C853, // Verde
            0x2962FF, // Azul
            0xAA00FF, // Violeta
            0x212121, // Negro
            0xF5F5F5, // Blanco
            0x9E9E9E, // Gris
            0x795548  // Marrón
        ];

        // --- Clase de Animación (Movida arriba para evitar ReferenceError) ---
        class TWEEN_Pop {
            constructor(mesh) {
                this.mesh = mesh;
                this.t = 0;
                this.animate();
            }
            animate() {
                this.t += 0.1;
                const s = Math.min(1, 1.2 * Math.sin(this.t)); // Overshoot effect
                if (this.t > Math.PI / 2) {
                    this.mesh.scale.set(1, 1, 1);
                    return;
                }
                this.mesh.scale.set(s, s, s);
                requestAnimationFrame(() => this.animate());
            }
        }

        init();
        animate();

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Necesario para damping
            renderer.render(scene, camera);
        }

        function init() {
            // Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f2f5); // Fondo gris muy claro

            // Cámara
            // Cámara
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(500, 800, 500);
            camera.lookAt(0, 0, 0);

            // Luces (Mejor iluminación para que parezca plástico)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(500, 1000, 750);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Plano de suelo (Invisible pero interactuable)
            const geometry = new THREE.PlaneGeometry(4000, 4000);
            geometry.rotateX(-Math.PI / 2);
            plane = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ visible: false }));
            scene.add(plane);
            objects.push(plane);

            // Grid
            const gridHelper = new THREE.GridHelper(4000, 80, 0xccc, 0xe5e5e5);
            scene.add(gridHelper);

            // Inicializar Ghost (Cursor)
            updateGhost();

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Amortiguación
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 100;
            controls.maxDistance = 2000;
            controls.maxPolarAngle = Math.PI / 2 - 0.1; // Evitar ir bajo el suelo

            // Raycaster
            raycaster = new THREE.Raycaster();
            pointer = new THREE.Vector2();

            // Eventos
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerdown', onPointerDown);
            document.addEventListener('pointerup', onPointerUp);
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', onKeyDown);

            // UI Inicialización
            initUI();

            // Bloque inicial centrado
            createLegoBlock(0, 25, 0, state.blockType, state.color, 0);
        }

        function initUI() {
            // 1. Paleta de Colores
            const colorContainer = document.getElementById('color-palette');
            legoColors.forEach((col, idx) => {
                const btn = document.createElement('div');
                btn.className = `color-btn ${idx === 0 ? 'active' : ''}`;
                btn.style.backgroundColor = '#' + col.toString(16).padStart(6, '0');
                btn.onclick = () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.color = col;
                    state.isDeleteMode = false;
                    updateUIState();
                    updateGhost();
                };
                colorContainer.appendChild(btn);
            });

            // 2. Selector de Piezas
            const piecesContainer = document.getElementById('pieces-container');
            pieceTypes.forEach((piece, idx) => {
                const btn = document.createElement('div');
                btn.className = `piece-btn ${piece.name === '2x2' ? 'active' : ''}`;
                btn.innerHTML = `
                    <div class="piece-preview ${piece.class}"></div>
                    <span class="piece-label">${piece.name}</span>
                `;
                btn.onclick = () => {
                    document.querySelectorAll('.piece-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.blockType = piece;
                    state.isDeleteMode = false;
                    updateUIState();
                    updateGhost();
                };
                piecesContainer.appendChild(btn);
            });

            // 3. Botones de Acción
            const delBtn = document.getElementById('delete-btn');
            delBtn.onclick = () => {
                state.isDeleteMode = !state.isDeleteMode;
                updateUIState();
                updateGhost();
            };

            document.getElementById('rotate-btn').onclick = rotateBlock;
            document.getElementById('clear-btn').onclick = clearWorld;
        }

        function updateUIState() {
            const delBtn = document.getElementById('delete-btn');
            if (state.isDeleteMode) {
                delBtn.classList.add('active');
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.piece-btn').forEach(b => b.classList.remove('active'));
            } else {
                delBtn.classList.remove('active');
                // Reactivar color actual visualmente si quisiéramos, pero ya se maneja al clickar color
            }
        }

        function rotateBlock() {
            state.rotation = (state.rotation + 1) % 2;
            updateGhost();
        }

        function onKeyDown(e) {
            if (e.key.toLowerCase() === 'r') {
                rotateBlock();
            }
        }

        // --- Lógica del Bloque Fantasma (Cursor) ---

        function updateGhost() {
            if (ghostGroup) scene.remove(ghostGroup);

            if (state.isDeleteMode) {
                // Crear un cubo rojo semitransparente genérico para borrar
                const geo = new THREE.BoxGeometry(UNIT, UNIT, UNIT);
                const mat = new THREE.MeshBasicMaterial({ color: 0xff0000, opacity: 0.5, transparent: true });
                ghostGroup = new THREE.Mesh(geo, mat);
            } else {
                // Crear el bloque seleccionado actual
                // Calculamos dimensiones basadas en rotación
                const w = state.rotation === 0 ? state.blockType.w : state.blockType.d;
                const d = state.rotation === 0 ? state.blockType.d : state.blockType.w;

                ghostGroup = createLegoMesh(w, d, state.color, true);
            }
            scene.add(ghostGroup);
        }

        // --- Generador de Geometría Lego ---

        function createLegoMesh(widthUnits, depthUnits, color, isGhost = false) {
            const group = new THREE.Group();

            const wSize = widthUnits * UNIT;
            const dSize = depthUnits * UNIT;
            const hSize = UNIT; // Altura estándar

            const material = isGhost
                ? new THREE.MeshBasicMaterial({ color: color, opacity: 0.6, transparent: true })
                : new THREE.MeshPhongMaterial({ color: color, shininess: 30, specular: 0x111111 });

            // 1. Bloque Base
            const baseGeo = new THREE.BoxGeometry(wSize, hSize, dSize);
            // Ajustar pivote para que el origen esté en el centro de la base inferior?
            // No, Three.js centra en 0,0,0.
            // Ajustaremos la posición en el placement.

            const base = new THREE.Mesh(baseGeo, material);
            base.castShadow = !isGhost;
            base.receiveShadow = !isGhost;
            group.add(base);

            // 2. Studs (Botones Superiores)
            const studGeo = new THREE.CylinderGeometry(12, 12, 8, 20);

            // Calcular offsets para centrar los studs
            const startX = -wSize / 2 + UNIT / 2;
            const startZ = -dSize / 2 + UNIT / 2;
            const yPos = hSize / 2 + 4; // Mitad altura bloque + mitad altura stud

            for (let ix = 0; ix < widthUnits; ix++) {
                for (let iz = 0; iz < depthUnits; iz++) {
                    const stud = new THREE.Mesh(studGeo, material);
                    stud.position.set(startX + ix * UNIT, yPos, startZ + iz * UNIT);
                    group.add(stud);
                }
            }

            // Añadir líneas negras sutiles para definición (solo si no es fantasma)
            if (!isGhost) {
                const edges = new THREE.EdgesGeometry(baseGeo);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.1, transparent: true }));
                group.add(line);
            }

            return group;
        }

        // --- Lógica Principal de Interacción ---

        function onPointerMove(event) {
            pointer.set(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );

            // Raycast
            raycaster.setFromCamera(pointer, camera);

            // IMPORTANTE: recursive = true para detectar hijos de grupos
            const intersects = raycaster.intersectObjects(objects, true);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                ghostGroup.visible = true;

                if (state.isDeleteMode) {
                    // En modo borrar, posicionar en el centro del objeto apuntado
                    if (intersect.object !== plane) {
                        // Encontrar el padre (el Grupo Lego)
                        let target = intersect.object;
                        while (target.parent && target.parent.type === 'Group') {
                            target = target.parent;
                        }
                        ghostGroup.position.copy(target.position);
                        ghostGroup.scale.set(1.1, 1.1, 1.1); // Ligeramente más grande
                    } else {
                        ghostGroup.visible = false;
                    }
                } else {
                    // Modo Construcción
                    ghostGroup.scale.set(1, 1, 1);

                    // Calcular posición
                    const point = intersect.point;
                    const normal = intersect.face.normal;

                    // Posición "ideal" basada en la normal
                    const pos = new THREE.Vector3().copy(point).add(normal.clone().multiplyScalar(2));

                    // Snap a Grid (Centro de celdas de 50)
                    pos.divideScalar(UNIT).floor().multiplyScalar(UNIT).addScalar(UNIT / 2);

                    // Ajuste por tamaño de bloque (Centrado)
                    // Si el ancho es par (2, 4), el centro cae en una línea de grid (ej 0, 50, 100)
                    // Si es impar (1, 3), el centro cae en medio de celda (ej 25, 75)
                    // Nuestro Snap arriba siempre da centros de celda (25, 75...).

                    const wUnits = state.rotation === 0 ? state.blockType.w : state.blockType.d;
                    const dUnits = state.rotation === 0 ? state.blockType.d : state.blockType.w;

                    // Offset para piezas pares: mover 25 unidades (medio bloque)
                    if (wUnits % 2 === 0) pos.x += UNIT / 2;
                    if (dUnits % 2 === 0) pos.z += UNIT / 2;

                    ghostGroup.position.copy(pos);
                }
            } else {
                ghostGroup.visible = false;
            }
        }

        function onPointerUp(event) {
            // Calcular distancia movida para distinguir click de drag
            const moveX = Math.abs(event.clientX - dragStartPos.x);
            const moveY = Math.abs(event.clientY - dragStartPos.y);

            // Si se movió más de 5px, es un drag (rotación), no un click
            if (moveX > 5 || moveY > 5) return;

            if (event.button !== 0) return;
            if (event.target.closest('#sidebar') || event.target.closest('#bottom-bar')) return;

            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObjects(objects, true);

            if (intersects.length > 0) {
                const intersect = intersects[0];

                if (state.isDeleteMode) {
                    if (intersect.object !== plane) {
                        // Borrar
                        let target = intersect.object;
                        // Subir hasta encontrar el grupo principal
                        while (target.parent && target.parent !== scene) {
                            target = target.parent;
                        }

                        // Remover de escena
                        scene.remove(target);

                        // Remover de array objects (hay que encontrar los hijos que metimos ahí)
                        // Simplificación: reconstruimos objects filtrando
                        // Nota: Esto no es lo más eficiente para apps gigantes, pero ok para demo
                        const index = objects.indexOf(target);
                        // objects en realidad contiene los hijos meshes. 
                        // Es complicado limpiar el array objects perfectamente aquí sin iterar.
                        // Haremos un truco: marcar como 'deleted' y filtrar en raycast? 
                        // Mejor: simplemente removemos el grupo de la escena. El raycaster 
                        // funciona checkeando scene.children o un array especifico.
                        // Si usamos `objects`, debemos remover los hijos de target de `objects`.

                        target.traverse((child) => {
                            const idx = objects.indexOf(child);
                            if (idx > -1) objects.splice(idx, 1);
                        });

                        createParticles(target.position, 0xff0000);
                    }
                } else {
                    // Colocar Bloque
                    const pos = ghostGroup.position.clone();

                    // Evitar poner bajo tierra
                    if (pos.y < 0) return;

                    // Crear
                    createLegoBlock(pos.x, pos.y, pos.z, state.blockType, state.color, state.rotation);
                }
            }
        }

        // Necesario para iniciar el drag check
        function onPointerDown(event) {
            if (event.target.closest('.tool-btn') || event.target.closest('.piece-btn') || event.target.closest('.color-btn')) return;

            dragStartPos = { x: event.clientX, y: event.clientY };
        }

        // --- Creación Real ---

        function createLegoBlock(x, y, z, typeData, color, rotVal) {
            const w = rotVal === 0 ? typeData.w : typeData.d;
            const d = rotVal === 0 ? typeData.d : typeData.w;

            const meshGroup = createLegoMesh(w, d, color, false);
            meshGroup.position.set(x, y, z);

            // Animación Pop
            meshGroup.scale.set(0, 0, 0);
            new TWEEN_Pop(meshGroup);

            scene.add(meshGroup);

            // Añadir hijos a interactuables
            meshGroup.traverse((child) => {
                if (child.isMesh) objects.push(child);
            });

            return meshGroup;
        }

        // --- Utilidades ---

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function clearWorld() {
            // Limpiar escena (manteniendo luces, grid, plano)
            // Estrategia: Recorrer objects (que son los meshes hijos) y borrar sus padres
            const toRemove = [];
            scene.traverse(child => {
                if (child.type === 'Group' && child !== ghostGroup) {
                    toRemove.push(child);
                }
            });
            toRemove.forEach(child => scene.remove(child));

            // Limpiar array de colisiones (manteniendo el plano index 0)
            objects.length = 1; // Index 0 es el plano

            createLegoBlock(0, 25, 0, { w: 2, d: 2 }, state.color, 0);

            const toast = document.getElementById('toast');
            toast.style.opacity = 1;
            setTimeout(() => toast.style.opacity = 0, 2000);
        }

        function createParticles(pos, color) {
            // Efecto visual simple
            const geo = new THREE.BoxGeometry(8, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: color });
            for (let i = 0; i < 5; i++) {
                const m = new THREE.Mesh(geo, mat);
                m.position.copy(pos);
                m.position.x += (Math.random() - 0.5) * 40;
                m.position.z += (Math.random() - 0.5) * 40;
                scene.add(m);

                let f = 0;
                function animP() {
                    f++;
                    m.position.y -= 2;
                    m.rotation.x += 0.1;
                    if (f < 30) requestAnimationFrame(animP);
                    else scene.remove(m);
                }
                animP();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

    </script>
</body>

</html>
